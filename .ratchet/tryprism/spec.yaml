  - "Mobile-first responsive design"
  - "No user registration or accounts — fully anonymous"
  - "No external analytics or tracking"
  - "No backend — pure static frontend"
  - "Client-side PDF generation"
  - "localStorage for result persistence"

delivery:
  format: web_app
  ui_direction:
    style: "Premium, calm, contemplative — dark mode with prismatic accent colors"
    key_screens:
      - name: home
        purpose: "Welcome, branding, mode selection"
        elements:
          - app_logo_title
          - tagline_description
          - quick_mode_card
          - full_mode_card
          - language_toggle
          - theme_toggle
      - name: quiz
        purpose: "Answer personality questions"
        elements:
          - question_number_and_progress_bar
          - question_text
          - likert_scale_options
          - back_button
          - next_button
      - name: results
        purpose: "Display comprehensive personality analysis"
        elements:
          - primary_type_hero (type number, name, brief tagline)
          - wing_indicator
          - nine_type_radar_chart
          - type_description (detailed, 200-400 words)
          - growth_stress_arrows_diagram
          - tritype_section
          - strengths_and_challenges
          - growth_suggestions
          - pdf_export_button
          - retake_button
          - share_section
      - name: history
        purpose: "View previous test results from localStorage"
        elements:
          - result_list_with_dates
          - view_detail_button
          - clear_history_button
    user_journey:
      - "home → select mode (quick/full)"
      - "quiz (54 or 108 questions) → results"
      - "results → PDF export or retake"
      - "home → history → view past results"
    mood: >
      Premium and contemplative. Think high-end wellness app meets professional psychological assessment.
      Dark backgrounds (#0a0a0f to #1a1a2e range) with prismatic accent colors — the "prism" metaphor
      of light splitting into a spectrum of personality facets. Subtle gradients, generous whitespace,
      refined typography. Each Enneagram type gets a unique accent color from the spectrum. Micro-animations
      for transitions (page changes, progress updates) that feel smooth, never flashy.
    anti_patterns:
      - "No gamification or points/badges"
      - "No countdown timers or time pressure"
      - "No social pressure (no 'X people taking this now')"
      - "No login/signup walls"
      - "No ads or upselling"
      - "No generic Bootstrap/Material UI look"
      - "No bright/neon colors in dark mode"

agent_guidance: |
  You are building "TryPrism" — a bilingual Enneagram personality test web app.

  DOMAIN CONTEXT:
  - Enneagram has 9 types organized in 3 centers: Gut (8,9,1), Heart (2,3,4), Head (5,6,7)
  - Wings are ALWAYS adjacent types on the circle (e.g., Type 4 can only have wing 3 or 5)
  - Tritype = dominant type in each center (e.g., 459 = Type 4 primary, Type 5 head, Type 9 gut)
  - Growth arrows: 1→7, 2→4, 3→6, 4→1, 5→8, 6→9, 7→5, 8→2, 9→3
  - Stress arrows: 1→4, 2→8, 3→9, 4→2, 5→7, 6→3, 7→1, 8→5, 9→6

  SCORING:
  - Use weighted Likert scoring (not simple tallying)
  - Each question contributes to 1-2 types with different weights
  - Normalize scores to produce percentage distribution across all 9 types
  - Flag low-confidence results when top scores are within 10% of each other

  QUESTIONS:
  - Quick mode: 54 questions (6 per type), ~8 min
  - Full mode: 108 questions (12 per type), ~15 min
  - Questions should probe core motivations and fears, not surface behaviors
  - Both Chinese and English versions must be psychologically equivalent (not literal translations)
  - Avoid Western-centric idioms and culturally biased scenarios

  ARCHITECTURE:
  - Pure static frontend — no backend, no API calls
  - Client-side PDF generation (choose appropriate library)
  - i18n with structured locale files (not hardcoded strings)
  - localStorage for saving results with timestamps

  DESIGN:
  - The "prism" metaphor: light (the test) splits into a spectrum (personality facets)
  - Each of the 9 types should have a distinct accent color from a prismatic palette
  - Dark mode default, premium calm aesthetic
  - Mobile-first but excellent on desktop too

  WHEN STUCK:
  - Scoring logic: refer to established Enneagram research, especially RHETI methodology
  - Visual design: use the prism/spectrum metaphor for inspiration
  - Chinese translations: prioritize natural expression over literal accuracy
  - PDF layout: aim for professional assessment report quality

  DO NOT:
  - Add a backend or database
  - Require user registration or authentication
  - Add external analytics or tracking scripts
  - Use gamification elements
  - Make the UI feel generic or template-like

ratchet:
  enabled: true
  default_budget: 8
  strategy: keep_best
  backend: git
  composite_score:
    method: weighted_average
    weights:
      auto_pass_rate: 0.7
      ai_review_avg: 0.3

profile_applied:
  - key: intervention
    value: minimal
    source: profile
  - key: quality_speed
    value: quality_first
    source: profile
  - key: risk_tolerance
    value: high
    source: profile
