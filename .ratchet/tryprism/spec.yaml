project:
  name: tryprism
  type: software
  description: >
    Bilingual (Chinese/English) Enneagram personality test web application with premium calm design.
    Pure static frontend with client-side PDF generation. Supports quick mode (54 questions, ~8 min)
    and full mode (108 questions, ~15 min). Detailed results including primary type, wing analysis,
    tritype, growth/stress arrows, and all 9-type score distribution. Dark mode default with light
    mode toggle. Results saved locally via localStorage.
  created: 2026-03-16
  status: draft

spec_version: 1
changelog:
  - version: 1
    date: 2026-03-16
    source: human
    change: "Initial spec from user intent"
    added: [all]
    modified: []
    removed: []

