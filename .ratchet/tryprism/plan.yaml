      - Write 108 full-mode questions (12 per type), quick mode as subset
      - Questions must probe motivations/fears, not surface behaviors
      - Both Chinese and English must be psychologically equivalent (not literal translations)
      - Avoid Western-centric idioms and culturally biased scenarios
      - Create i18n system with locale switching
      - Create en.json and zh.json locale files for all UI strings
      - Ensure bidirectional key parity (every en key exists in zh and vice versa)
    depends_on: [wp-01]
