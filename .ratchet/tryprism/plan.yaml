work_packages:
  - id: wp-01
    name: "Scoring engine + data types"
    description: |
      Build the core scoring algorithm and TypeScript types.
      - Define Enneagram types, Answer, ScoreResult interfaces
      - Implement weighted Likert scoring (each question contributes to 1-2 types)
      - Implement wing calculation (adjacent types only)
      - Implement tritype detection (dominant type per center: Gut 8/9/1, Heart 2/3/4, Head 5/6/7)
      - Implement confidence detection (lowConfidence when top scores within 10%)
      - Implement flat profile detection
      - Score normalization to percentage distribution (sum to 100)
      - Growth arrows: 1→7, 2→4, 3→6, 4→1, 5→8, 6→9, 7→5, 8→2, 9→3
      - Stress arrows: 1→4, 2→8, 3→9, 4→2, 5→7, 6→3, 7→1, 8→5, 9→6
    depends_on: []
    parallel_group: "A"
    inputs: []
    outputs:
      - src/lib/scoring.ts
      - src/types/index.ts
    executor: claude-code
    workspace: /Users/coder/Projects/northarc/tryprism
    test_files:
      - tests/unit/INV-06.test.ts
      - tests/unit/INV-07.test.ts
    ratchet:
      budget: 6
      composite_weights:
        auto_pass_rate: 0.9
        ai_review_avg: 0.1
    acceptance:
